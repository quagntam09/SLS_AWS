# "org" ensures this Service is used with the correct Serverless Framework License Key.
org: quagntam
# "service" is the name of this project. This will also be added to your AWS resource names.
service: NSGA2IS-SLS

custom:
  wsgi:
    app: app.app
  pythonRequirements:
    dockerizePip: non-linux # Bắt buộc tải thư viện theo chuẩn Linux của AWS Lambda (tránh lỗi nếu build trên Windows/Mac)
    slim: true              # Loại bỏ các tệp tin không cần thiết của thư viện để giảm dung lượng

provider:
  name: aws
  runtime: python3.12
  # Uncomment to easily set up a custom domain. Read the docs for more details:
  # https://www.serverless.com/framework/docs/providers/aws/guide/domains
  # domain: api.example.com

functions:
  api:
    handler: wsgi_handler.handler
    events:
      - http:
          path: /
          method: ANY
      - http:
          path: /{proxy+}
          method: ANY

plugins:
  - serverless-wsgi
  - serverless-python-requirements

package:
  patterns:
    - '!node_modules/**'
    - '!tests/**'
    - '!README.md'
    - '!.git/**'
    - '!venv/**'
    - '!.venv/**'
    - '!__pycache__/**'
    - '!.serverless/**'