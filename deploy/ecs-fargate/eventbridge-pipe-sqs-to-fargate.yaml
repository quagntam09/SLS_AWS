AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge Pipes sample to launch one Fargate task per SQS message.

Parameters:
  ClusterArn:
    Type: String
  QueueArn:
    Type: String
  TaskDefinitionArn:
    Type: String
  TaskExecutionRoleArn:
    Type: String
  TaskRoleArn:
    Type: String
  SubnetIds:
    Type: CommaDelimitedList
  SecurityGroupIds:
    Type: CommaDelimitedList
  ContainerName:
    Type: String
    Default: nsga2-worker
  AppEnv:
    Type: String
    Default: production
  TableName:
    Type: String
  BucketName:
    Type: String
  AwsRegion:
    Type: String
    Default: ap-southeast-2

Resources:
  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: oade-nsga2-sls-pipes-run-task
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RunTask
                Resource:
                  - !Ref TaskDefinitionArn
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !Ref TaskExecutionRoleArn
                  - !Ref TaskRoleArn
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !Ref QueueArn

  SqsToFargatePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: oade-nsga2-sls-sqs-to-fargate
      RoleArn: !GetAtt PipesRole.Arn
      Source: !Ref QueueArn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
      Target: !Ref ClusterArn
      TargetParameters:
        EcsTaskParameters:
          TaskDefinitionArn: !Ref TaskDefinitionArn
          TaskCount: 1
          LaunchType: FARGATE
          PlatformVersion: LATEST
          EnableEcsManagedTags: true
          EnableExecuteCommand: false
          NetworkConfiguration:
            AwsvpcConfiguration:
              AssignPublicIp: DISABLED
              Subnets: !Ref SubnetIds
              SecurityGroups: !Ref SecurityGroupIds
          Overrides:
            ContainerOverrides:
              - Name: !Ref ContainerName
                Environment:
                  - Name: APP_ENV
                    Value: !Ref AppEnv
                  - Name: TABLE_NAME
                    Value: !Ref TableName
                  - Name: BUCKET_NAME
                    Value: !Ref BucketName
                  - Name: AWS_REGION
                    Value: !Ref AwsRegion
                  - Name: WORKER_EVENT_JSON
                    Value: <$.body>
                  - Name: REQUEST_ID
                    Value: <$.body.request_id>
      Description: Launch one Fargate worker per SQS message and pass the message body as WORKER_EVENT_JSON.
