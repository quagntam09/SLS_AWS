AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Fargate worker stack for NSGA2IS-SLS.

Parameters:
  VpcId:
    Type: String
  SubnetIds:
    Type: List<String>
  QueueArn:
    Type: String
  DlqName:
    Type: String
    Default: nsga2is-sls-worker-dlq
  ImageUri:
    Type: String
  TableName:
    Type: String
  BucketName:
    Type: String
  AppEnv:
    Type: String
    Default: production
  AppOptimizerPopulationSize:
    Type: String
    Default: '500'
  AppOptimizerGenerations:
    Type: String
    Default: '500'
  AppParetoOptionsLimit:
    Type: String
    Default: '6'
  AppProgressUpdateInterval:
    Type: String
    Default: '50'
  AppRandomizationStrength:
    Type: String
    Default: '0.08'
  AppRandomSeed:
    Type: String
    Default: '42'
  AwsRegion:
    Type: String
    Default: ap-southeast-1
  WorkerMaxRuntimeSeconds:
    Type: String
    Default: '7200'
  Cpu:
    Type: String
    Default: '1024'
  Memory:
    Type: String
    Default: '2048'
  AssignPublicIp:
    Type: String
    Default: DISABLED

Resources:
  WorkerCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: nsga2is-sls-worker-cluster

  WorkerDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref DlqName
      SqsManagedSseEnabled: true

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/nsga2is-sls-worker
      RetentionInDays: 7

  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG for Fargate worker
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0

  WorkerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  WorkerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WorkerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:UpdateItem, dynamodb:GetItem]
                Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}"
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource: !Sub "arn:aws:s3:::${BucketName}/*"

  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: nsga2is-sls-worker
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt WorkerExecutionRole.Arn
      TaskRoleArn: !GetAtt WorkerTaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: nsga2-worker
          Image: !Ref ImageUri
          Command: [python, -m, server.app.worker]
          Environment:
            - Name: APP_ENV
              Value: !Ref AppEnv
            - Name: TABLE_NAME
              Value: !Ref TableName
            - Name: BUCKET_NAME
              Value: !Ref BucketName
            - Name: WORKER_MAX_RUNTIME_SECONDS
              Value: !Ref WorkerMaxRuntimeSeconds
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WorkerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [sqs:ReceiveMessage, sqs:DeleteMessage, sqs:GetQueueAttributes]
                Resource: !Ref QueueArn
              - Effect: Allow
                Action: [ecs:RunTask]
                Resource: !Ref WorkerTaskDefinition
              - Effect: Allow
                Action: [iam:PassRole]
                Resource:
                  - !GetAtt WorkerExecutionRole.Arn
                  - !GetAtt WorkerTaskRole.Arn

  SqsToFargatePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: nsga2is-sls-sqs-to-fargate
      RoleArn: !GetAtt PipeRole.Arn
      Source: !Ref QueueArn
      Target: !GetAtt WorkerCluster.Arn
      TargetParameters:
        EcsTaskParameters:
          TaskDefinitionArn: !Ref WorkerTaskDefinition
          LaunchType: FARGATE
          PlatformVersion: LATEST
          EnableExecuteCommand: false
          NetworkConfiguration:
            AwsvpcConfiguration:
              AssignPublicIp: !Ref AssignPublicIp
              Subnets: !Ref SubnetIds
              SecurityGroups: [!Ref WorkerSecurityGroup]
          Overrides:
            ContainerOverrides:
              - Name: nsga2-worker
                Environment:
                  - Name: WORKER_EVENT_JSON
                    Value: '$.body'
                  - Name: REQUEST_ID
                    Value: '$.body.request_id'

Outputs:
  PipeName:
    Value: !Ref SqsToFargatePipe