# "org" ensures this Service is used with the correct Serverless Framework License Key.
org: ${env:SERVERLESS_ORG, 'quagntam'}
# "service" is the name of this project. This will also be added to your AWS resource names.
service: OADE-NSGA2-SLS

useDotenv: true

plugins:
  - serverless-dotenv-plugin
  - serverless-python-requirements

custom:
  # serverless-dotenv-plugin: loại trừ các biến AWS credential để không bị inject vào Lambda env.
  # Lambda tự nhận credential qua IAM role, không được set thủ công.
  dotenv:
    exclude:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_REGION

  pythonRequirements:
    dockerizePip: non-linux  # Dùng Docker để build packages tương thích Linux khi chạy trên Windows/Mac
    layer: true              # Đóng gói dependencies vào Lambda Layer thay vì nhúng vào zip
    useStaticCache: false    # Bỏ qua cache cũ, force rebuild lần này
  # Giá trị mặc định cho CORS. Đặt env var APP_CORS_ALLOW_ORIGINS để override khi deploy.
  # Không được dùng cú pháp ${env:VAR, 'http://...'} vì SLS v4 parse 'http' thành provider name.
  corsAllowOrigins: "http://localhost:3000,https://nsga-ii-ot.vercel.app"

provider:
  name: aws
  runtime: python3.11
  region: ${env:AWS_REGION, 'ap-southeast-2'}
  # 30s is for the NSGA submit API path; the actual schedule generation runs async in the worker.
  timeout: 30
  httpApi:
    cors:
      allowedOrigins:
        - "http://localhost:3000"
        - "https://nsga-ii-ot.vercel.app"
      allowedHeaders:
        - Content-Type
        - Authorization
        - X-Requested-With
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource:
            - Fn::GetAtt: [ScheduleJobsQueue, Arn]
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
          Resource:
            - Fn::GetAtt: [ScheduleRequestsTable, Arn]
        - Effect: Allow
          Action:
            - s3:GetObject
          Resource:
            - Fn::Join:
                - ""
                - - "arn:aws:s3:::"
                  - Ref: ScheduleResultsBucket
                  - "/*"
  environment:
    PYTHONPATH: "/var/task/OADE-NSGA-II-SLS:/var/task:/opt/python"
    APP_ENV: ${env:APP_ENV, 'production'}
    APP_OPTIMIZER_POPULATION_SIZE: ${env:APP_OPTIMIZER_POPULATION_SIZE, 500}
    APP_OPTIMIZER_GENERATIONS: ${env:APP_OPTIMIZER_GENERATIONS, 500}
    APP_PARETO_OPTIONS_LIMIT: ${env:APP_PARETO_OPTIONS_LIMIT, 6}
    APP_PROGRESS_UPDATE_INTERVAL: ${env:APP_PROGRESS_UPDATE_INTERVAL, 50}
    APP_RANDOMIZATION_STRENGTH: ${env:APP_RANDOMIZATION_STRENGTH, 0.08}
    APP_RANDOM_SEED: ${env:APP_RANDOM_SEED, 42}
    APP_SHIFT_HOURS: ${env:APP_SHIFT_HOURS, 4.5}
    APP_MAX_CONSECUTIVE_DAYS: ${env:APP_MAX_CONSECUTIVE_DAYS, 5}
    S3_RESULT_PREFIX: ${env:S3_RESULT_PREFIX, 'results'}
    APP_API_KEY: ${env:APP_API_KEY, ''}
    APP_CORS_ALLOW_ORIGINS: ${env:APP_CORS_ALLOW_ORIGINS, '${self:custom.corsAllowOrigins}'}
    ROOT_PATH: ${env:ROOT_PATH, '/dev'}
    QUEUE_URL:
      Ref: ScheduleJobsQueue
    TABLE_NAME:
      Ref: ScheduleRequestsTable
    BUCKET_NAME:
      Ref: ScheduleResultsBucket

functions:
  api:
    handler: bootstrap.handler
    # Keep the submit endpoint aligned with the provider timeout above.
    timeout: 30
    layers:
      - Ref: PythonRequirementsLambdaLayer
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY

package:
  patterns:
    - '!node_modules/**'
    - '!tests/**'
    - '!.git/**'
    - '!venv/**'
    - '!.venv/**'
    - '!OADE-NSGA-II-SLS/.venv/**'
    - '!OADE-NSGA-II-SLS/.serverless/**'
    - '!OADE-NSGA-II-SLS/node_modules/**'
    - '!OADE-NSGA-II-SLS/tests/**'
    - '!OADE-NSGA-II-SLS/artifacts/**'
    - '!OADE-NSGA-II-SLS/**/*.md'
    - '!OADE-NSGA-II-SLS/**/*.json'
    - '!OADE-NSGA-II-SLS/**/*.sh'
    - '!serverless-state.json'
    - '!**/__pycache__/**'
    - '!**/*.pyc'
    - '!.env'

resources:
  Resources:
    ScheduleJobsQueue:
      Type: AWS::SQS::Queue
      Properties:
        VisibilityTimeout: 1800
        MessageRetentionPeriod: 1209600
    ScheduleRequestsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${sls:stage}-requests
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: request_id
            AttributeType: S
        KeySchema:
          - AttributeName: request_id
            KeyType: HASH
    ScheduleResultsBucket:
      Type: AWS::S3::Bucket
    WorkerInstanceRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service:
                  - ec2.amazonaws.com
              Action:
                - sts:AssumeRole
        Policies:
          - PolicyName: oade-nsga2-sls-worker-access
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - sqs:ReceiveMessage
                    - sqs:DeleteMessage
                    - sqs:ChangeMessageVisibility
                    - sqs:GetQueueAttributes
                  Resource:
                    - Fn::GetAtt: [ScheduleJobsQueue, Arn]
                - Effect: Allow
                  Action:
                    - dynamodb:UpdateItem
                    - dynamodb:GetItem
                  Resource:
                    - Fn::GetAtt: [ScheduleRequestsTable, Arn]
                - Effect: Allow
                  Action:
                    - s3:PutObject
                  Resource:
                    - Fn::Join:
                        - ""
                        - - "arn:aws:s3:::"
                          - Ref: ScheduleResultsBucket
                          - "/*"
    WorkerInstanceProfile:
      Type: AWS::IAM::InstanceProfile
      Properties:
        Path: /
        Roles:
          - Ref: WorkerInstanceRole

  Outputs:
    ScheduleJobsQueueUrl:
      Value:
        Ref: ScheduleJobsQueue
    ScheduleJobsQueueArn:
      Value:
        Fn::GetAtt: [ScheduleJobsQueue, Arn]
    ScheduleRequestsTableName:
      Value:
        Ref: ScheduleRequestsTable
    ScheduleResultsBucketName:
      Value:
        Ref: ScheduleResultsBucket
    WorkerInstanceRoleArn:
      Value:
        Fn::GetAtt: [WorkerInstanceRole, Arn]
    WorkerInstanceProfileName:
      Value:
        Ref: WorkerInstanceProfile