# "org" ensures this Service is used with the correct Serverless Framework License Key.
org: quagntam
# "service" is the name of this project. This will also be added to your AWS resource names.
service: NSGA2IS-SLS

plugins:
  - serverless-python-requirements
  - serverless-dotenv-plugin

custom:
  pythonRequirements:
    dockerizePip: non-linux # Bắt buộc tải thư viện theo chuẩn Linux của AWS Lambda (tránh lỗi nếu build trên Windows/Mac)
    slim: true              # Loại bỏ các tệp tin không cần thiết của thư viện để giảm dung lượng

provider:
  name: aws
  runtime: python3.12
  region: ap-southeast-1
  timeout: 30
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource:
            - Fn::GetAtt: [ScheduleJobsQueue, Arn]
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
          Resource:
            - Fn::GetAtt: [ScheduleRequestsTable, Arn]
        - Effect: Allow
          Action:
            - s3:GetObject
          Resource:
            - Fn::Join:
                - ""
                - - "arn:aws:s3:::"
                  - Ref: ScheduleResultsBucket
                  - "/*"
  environment:
    PYTHONPATH: "/var/task:/var/task/server"
    APP_ENV: ${env:APP_ENV, 'production'}
    APP_OPTIMIZER_POPULATION_SIZE: ${env:APP_OPTIMIZER_POPULATION_SIZE, 500}
    APP_OPTIMIZER_GENERATIONS: ${env:APP_OPTIMIZER_GENERATIONS, 500}
    APP_PARETO_OPTIONS_LIMIT: ${env:APP_PARETO_OPTIONS_LIMIT, 6}
    APP_PROGRESS_UPDATE_INTERVAL: ${env:APP_PROGRESS_UPDATE_INTERVAL, 50}
    APP_RANDOMIZATION_STRENGTH: ${env:APP_RANDOMIZATION_STRENGTH, 0.08}
    APP_RANDOM_SEED: ${env:APP_RANDOM_SEED, 42}
    APP_CORS_ALLOW_ORIGINS: ${env:APP_CORS_ALLOW_ORIGINS, 'http://localhost:3000'}
    SCHEDULE_QUEUE_URL:
      Ref: ScheduleJobsQueue
    SCHEDULE_TABLE_NAME:
      Ref: ScheduleRequestsTable
    SCHEDULE_RESULTS_BUCKET:
      Ref: ScheduleResultsBucket
    QUEUE_URL:
      Ref: ScheduleJobsQueue
    TABLE_NAME:
      Ref: ScheduleRequestsTable
    BUCKET_NAME:
      Ref: ScheduleResultsBucket

functions:
  api:
    handler: bootstrap.handler
    timeout: 30
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY

package:
  patterns:
    - '!node_modules/**'
    - '!tests/**'
    - '!.git/**'
    - '!venv/**'
    - '!.venv/**'
    - '!NSGA2IS-SLS/.venv/**'
    - '!NSGA2IS-SLS/.serverless/**'
    - '!NSGA2IS-SLS/node_modules/**'
    - '!NSGA2IS-SLS/tests/**'
    - '!NSGA2IS-SLS/artifacts/**'
    - '!NSGA2IS-SLS/**/*.md'
    - '!NSGA2IS-SLS/**/*.json'
    - '!NSGA2IS-SLS/**/*.sh'
    - '!**/__pycache__/**'
    - '!**/*.pyc'
    - '!.serverless/**'
    - '!.env'
    - '!server/src/**'

resources:
  Resources:
    ScheduleJobsQueue:
      Type: AWS::SQS::Queue
      Properties:
        VisibilityTimeout: 1800
        MessageRetentionPeriod: 1209600
    ScheduleRequestsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${sls:stage}-requests
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: request_id
            AttributeType: S
        KeySchema:
          - AttributeName: request_id
            KeyType: HASH
    ScheduleResultsBucket:
      Type: AWS::S3::Bucket
    WorkerInstanceRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service:
                  - ec2.amazonaws.com
              Action:
                - sts:AssumeRole
        Policies:
          - PolicyName: nsga2is-sls-worker-access
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - sqs:ReceiveMessage
                    - sqs:DeleteMessage
                    - sqs:ChangeMessageVisibility
                    - sqs:GetQueueAttributes
                  Resource:
                    - Fn::GetAtt: [ScheduleJobsQueue, Arn]
                - Effect: Allow
                  Action:
                    - dynamodb:UpdateItem
                    - dynamodb:GetItem
                  Resource:
                    - Fn::GetAtt: [ScheduleRequestsTable, Arn]
                - Effect: Allow
                  Action:
                    - s3:PutObject
                  Resource:
                    - Fn::Join:
                        - ""
                        - - "arn:aws:s3:::"
                          - Ref: ScheduleResultsBucket
                          - "/*"
    WorkerInstanceProfile:
      Type: AWS::IAM::InstanceProfile
      Properties:
        Path: /
        Roles:
          - Ref: WorkerInstanceRole

  Outputs:
    ScheduleJobsQueueUrl:
      Value:
        Ref: ScheduleJobsQueue
    ScheduleJobsQueueArn:
      Value:
        Fn::GetAtt: [ScheduleJobsQueue, Arn]
    ScheduleRequestsTableName:
      Value:
        Ref: ScheduleRequestsTable
    ScheduleResultsBucketName:
      Value:
        Ref: ScheduleResultsBucket
    WorkerInstanceRoleArn:
      Value:
        Fn::GetAtt: [WorkerInstanceRole, Arn]
    WorkerInstanceProfileName:
      Value:
        Ref: WorkerInstanceProfile